name: plume
description: Plume — gérez vos finances en douceur. Offline-first, léger, élégant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.4

  # Charts
  fl_chart: ^0.68.0

  # Notifications + Background sync
  flutter_local_notifications: ^17.1.2
  workmanager: ^0.5.2          # background tasks (sync 2h du matin)

  # Date & Time
  intl: ^0.19.0

  # Network
  http: ^1.2.1                 # OTP + Google Drive API (léger, pas de SDK lourd)

  # Auth & Backup
  supabase_flutter: ^2.5.6     # OTP email auth (léger ~2Mo)
  googleapis_auth: ^1.6.0      # Google Drive OAuth tokens

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0

  # Sharing
  share_plus: ^9.0.0

  # PDF generation (rapport mensuel)
  pdf: ^3.11.1
  printing: ^5.13.1

  # Android Home Widget
  home_widget: ^0.7.0
  url_launcher: ^6.2.6

  # UI
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    
flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icons/plume_icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true
