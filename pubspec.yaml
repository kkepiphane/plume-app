name: plume
description: Application de gestion personnelle de l'argent - offline-first, rapide et légère.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^17.1.0

  # Charts
  fl_chart: ^1.1.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Date & Time
  intl: ^0.20.2

  # CSV/Excel Export
  csv: ^5.1.1
  excel: ^4.0.3

  # File System & Sharing
  path_provider: ^2.1.3
  share_plus: ^12.0.1
  url_launcher: ^6.2.6

  # Google Drive (optionnel)
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  http: ^1.2.1

  # UI Extras
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fluttertoast: ^9.0.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/plume_icon_12024.png"
  min_sdk_android: 21
  remove_alpha_ios: true